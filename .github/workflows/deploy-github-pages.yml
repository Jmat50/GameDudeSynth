name: Deploy live demo to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GameDudeSynth
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build browser bundles
        run: npm run build:all

      - name: Refresh demo manifest
        run: npm run demos:manifest

      - name: Build butterchurn vendor bundle
        run: npm run build:butterchurn

      - name: Verify butterchurn vendor bundle
        run: npm run verify:butterchurn

      - name: Assemble GitHub Pages site
        run: npm run build:pages

      - name: Deploy to jmat50.github.io/GameDudeSynth
        env:
          GITHUB_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/Jmat50/jmat50.github.io.git" pages-repo
          cd pages-repo

          rm -rf GameDudeSynth
          rm -f main-v2-export.html engine.html gamedude-player.html
          rm -rf public src-player vendor demos

          cp -r "$GITHUB_WORKSPACE/dist/github-pages/GameDudeSynth" ./GameDudeSynth
          rm -f .nojekyll

          git add -A
          if git diff --staged --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          git commit -m "Deploy GameDudeSynth @ ${{ github.sha }}"
          git push
